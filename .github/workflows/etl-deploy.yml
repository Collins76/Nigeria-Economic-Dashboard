name: ETL & Deploy

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  etl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create .env.local file
        run: |
          echo "POSTGRES_URL=${{ secrets.VERCEL_POSTGRES_URL }}" > .env.local
          echo "DATABASE_URL=${{ secrets.VERCEL_POSTGRES_URL }}" >> .env.local

      - name: Install server dependencies
        run: |
          cd server
          npm install

      - name: Initialize Database
        run: |
          cd server
          export $(cat ../.env.local | grep -v '^#' | xargs)
          npm run db:init

      - name: Run ETL Pipeline
        run: |
          cd server
          export $(cat ../.env.local | grep -v '^#' | xargs)
          npm run etl:run

      - name: Update timestamp to trigger Vercel
        run: |
          date -u +"%Y-%m-%d %H:%M UTC" > .etl-last-run
          git add .etl-last-run
          git config user.name "ETL Bot"
          git config user.email "etl@github.com"
          git commit -m "chore: ETL data update $(date -u +'%Y-%m-%d')" || true
          git push https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/Collins76/Nigeria-Economic-Dashboard.git main
