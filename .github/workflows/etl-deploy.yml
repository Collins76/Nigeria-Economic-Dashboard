name: ETL & Deploy

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  etl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Vercel Login
        run: vercel link --yes --token ${{ secrets.VERCEL_TOKEN }}

      - name: Get Postgres Connection String
        id: get-db
        run: |
          echo "Getting Vercel Postgres credentials..."
          # Install jq for parsing JSON
          sudo apt-get install -y jq
          
          # Get the storage info
          vercel storage ls --token ${{ secrets.VERCEL_TOKEN }} 2>/dev/null || true
          
          # The POSTGRES_URL should be in the project env
          echo "Fetching database URL from Vercel..."
          
          # Create a simple .env file with the database URL
          echo "POSTGRES_URL=${{ secrets.VERCEL_POSTGRES_URL }}" > .env.local
          cat .env.local

      - name: Install server dependencies
        run: |
          cd server
          npm install

      - name: Initialize Database
        run: |
          cd server
          export $(cat ../.env.local | grep -v '^#' | xargs)
          npm run db:init
        env:
          DATABASE_URL: ${{ secrets.VERCEL_POSTGRES_URL }}

      - name: Run ETL Pipeline
        run: |
          cd server
          export $(cat ../.env.local | grep -v '^#' | xargs)
          npm run etl:run
        env:
          DATABASE_URL: ${{ secrets.VERCEL_POSTGRES_URL }}

  deploy:
    needs: etl
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: --prod
